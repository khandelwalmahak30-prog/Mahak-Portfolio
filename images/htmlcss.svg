  <rect x="556" y="234" width="125" height="6" rx="3" fill="rgba(148,163,184,0.2)"/>
  <rect x="556" y="246" width="105" height="6" rx="3" fill="rgba(148,163,184,0.15)"/>
  <!-- Tags -->
  <rect x="556" y="262" width="38" height="18" rx="9" fill="rgba(228,77,38,0.15)" stroke="rgba(228,77,38,0.35)" stroke-width="1"/>
  <text x="563" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f16529">HTML</text>
  <rect x="602" y="262" width="32" height="18" rx="9" fill="rgba(41,101,241,0.15)" stroke="rgba(41,101,241,0.35)" stroke-width="1"/>
  <text x="609" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#2965f1">CSS</text>
  <!-- Bottom -->
  <rect x="556" y="289" width="190" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="556" y="308" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.5)">Form Validation UI</text>
  <text x="556" y="323" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.4)">CSS Variables</text>
  <text x="556" y="338" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.4)">Dark Theme</text>
  <!-- Side accent -->
  <rect x="544" y="72" width="4" height="340" rx="2" fill="url(#cssBlue)" opacity="0.7"/>

  <!-- Bottom bar -->
