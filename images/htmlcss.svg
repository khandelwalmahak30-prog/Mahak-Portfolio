  <circle cx="210" cy="160" r="32" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.3)" stroke-width="1.5"/>
  <circle cx="210" cy="155" r="14" fill="rgba(124,58,237,0.35)"/>
  <ellipse cx="210" cy="182" rx="22" ry="14" fill="rgba(124,58,237,0.25)"/>
