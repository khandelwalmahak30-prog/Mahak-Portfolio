  <rect x="55" y="289" width="190" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="55" y="308" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.5)">Responsive Design</text>
  <text x="55" y="323" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.4)">Flexbox Layout</text>
  <text x="55" y="338" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.4)">CSS Animations</text>
  <!-- Glow accent -->
  <rect x="42" y="72" width="4" height="340" rx="2" fill="url(#htmlOrange)" opacity="0.7"/>

