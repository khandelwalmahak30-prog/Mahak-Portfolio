  <text x="305" y="308" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.5)">Glassmorphism Cards</text>
  <text x="305" y="323" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.4)">CSS Grid Layout</text>
  <text x="305" y="338" font-family="Arial,sans-serif" font-size="10" fill="rgba(148,163,184,0.4)">Hover Animations</text>
  <!-- Featured badge -->
