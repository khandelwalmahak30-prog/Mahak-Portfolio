  <rect x="55" y="234" width="130" height="6" rx="3" fill="rgba(148,163,184,0.2)"/>
  <rect x="55" y="246" width="100" height="6" rx="3" fill="rgba(148,163,184,0.15)"/>
  <!-- Tags -->
  <rect x="55" y="262" width="38" height="18" rx="9" fill="rgba(228,77,38,0.15)" stroke="rgba(228,77,38,0.35)" stroke-width="1"/>
  <text x="62" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f16529">HTML</text>
  <rect x="101" y="262" width="32" height="18" rx="9" fill="rgba(41,101,241,0.15)" stroke="rgba(41,101,241,0.35)" stroke-width="1"/>
  <text x="108" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#2965f1">CSS</text>
