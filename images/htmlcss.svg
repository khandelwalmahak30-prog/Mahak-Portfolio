  <text x="378" y="92" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="white">FEATURED</text>
  <!-- Side accent -->
  <rect x="293" y="72" width="4" height="340" rx="2" fill="url(#purpleBlue)" opacity="0.9"/>

  <!-- ===== CARD 3 — Form / Login ===== -->
  <rect x="544" y="72" width="215" height="340" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="544" y="72" width="215" height="175" rx="14" fill="rgba(255,255,255,0.05)"/>
  <rect x="544" y="200" width="215" height="47" fill="rgba(255,255,255,0.05)"/>
  <!-- Browser bar -->
