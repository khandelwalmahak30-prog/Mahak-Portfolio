  <rect x="318" y="193" width="60" height="14" rx="7" fill="url(#purpleBlue)" opacity="0.8"/>
  <rect x="403" y="113" width="85" height="120" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
  <rect x="406" y="116" width="79" height="45" rx="8" fill="rgba(56,189,248,0.25)"/>
