<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d1a"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="htmlOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e44d26"/>
      <stop offset="100%" style="stop-color:#f16529"/>
    </linearGradient>
    <linearGradient id="cssBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#264de4"/>
      <stop offset="100%" style="stop-color:#2965f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowFilter">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow1)"/>
  <rect width="800" height="500" fill="url(#glow2)"/>

  <!-- Grid dots pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)"/>

  <!-- Section label top center -->
  <rect x="310" y="22" width="180" height="26" rx="13" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="359" y="39" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="2">MINI PROJECTS</text>

  <!-- ===== CARD 1 — Landing Page ===== -->
  <rect x="42" y="72" width="215" height="340" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>
  <!-- Card image area -->
  <rect x="42" y="72" width="215" height="175" rx="14" fill="rgba(255,255,255,0.06)"/>
  <rect x="42" y="200" width="215" height="47" fill="rgba(255,255,255,0.06)"/>
  <!-- Browser bar mockup -->
  <rect x="52" y="82" width="195" height="16" rx="4" fill="rgba(0,0,0,0.3)"/>
  <circle cx="63" cy="90" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="75" cy="90" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="87" cy="90" r="3" fill="#22c55e" opacity="0.7"/>
  <rect x="100" y="85" width="120" height="10" rx="5" fill="rgba(255,255,255,0.07)"/>
  <!-- Page hero mockup -->
  <rect x="52" y="106" width="195" height="135" rx="0" fill="rgba(124,58,237,0.08)"/>
  <!-- Navbar line -->
  <rect x="52" y="106" width="195" height="18" fill="rgba(0,0,0,0.25)"/>
  <rect x="60" y="112" width="30" height="6" rx="3" fill="rgba(124,58,237,0.6)"/>
  <rect x="170" y="112" width="20" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="198" y="112" width="20" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="226" y="112" width="14" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
