  <circle cx="565" cy="90" r="3" fill="#ef4444" opacity="0.7"/>
  <circle cx="577" cy="90" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="589" cy="90" r="3" fill="#22c55e" opacity="0.7"/>
