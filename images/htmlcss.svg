  <text x="312" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f16529">HTML</text>
  <rect x="351" y="262" width="32" height="18" rx="9" fill="rgba(41,101,241,0.15)" stroke="rgba(41,101,241,0.35)" stroke-width="1"/>
  <text x="358" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#2965f1">CSS</text>
  <rect x="391" y="262" width="48" height="18" rx="9" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="399" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#fbbf24">Design</text>
