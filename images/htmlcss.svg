  <rect x="293" y="72" width="215" height="340" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(124,58,237,0.2)" stroke-width="1" filter="url(#cardShadow)"/>
  <!-- Highlighted card (featured) -->
  <rect x="293" y="72" width="215" height="175" rx="14" fill="rgba(124,58,237,0.08)"/>
  <rect x="293" y="200" width="215" height="47" fill="rgba(124,58,237,0.08)"/>
