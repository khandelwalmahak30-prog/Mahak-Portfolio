  <text x="597" y="151" font-family="Arial,sans-serif" font-size="8" fill="rgba(148,163,184,0.5)">Email</text>
  <rect x="590" y="162" width="123" height="18" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="597" y="175" font-family="Arial,sans-serif" font-size="8" fill="rgba(148,163,184,0.5)">Password</text>
