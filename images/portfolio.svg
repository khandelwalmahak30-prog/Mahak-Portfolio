<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d1a"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.07)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#9d5cf6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="85%" r="35%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="580" cy="250" r="100"/>
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow1)"/>
  <rect width="800" height="500" fill="url(#glow2)"/>

  <!-- Navbar bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(7,13,26,0.9)" opacity="0.95"/>
  <rect x="0" y="47" width="800" height="1" fill="rgba(255,255,255,0.07)"/>
  <!-- Logo -->
  <text x="32" y="31" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#7c3aed">Mahak.</text>
  <!-- Nav links -->
  <text x="300" y="29" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Home</text>
  <text x="355" y="29" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">About</text>
  <text x="410" y="29" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Skills</text>
  <text x="463" y="29" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Projects</text>
  <text x="524" y="29" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Contact</text>
  <!-- Theme toggle dot -->
  <rect x="720" y="14" width="22" height="22" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="726" y="29" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">☽</text>

  <!-- Scroll progress bar -->
  <rect x="0" y="47" width="320" height="2" fill="url(#btnGrad)" rx="1"/>

  <!-- LEFT — Hero text -->
  <text x="52" y="125" font-family="Arial,sans-serif" font-size="12" fill="#a855f7" letter-spacing="1">Hello, I'm</text>
  <text x="52" y="168" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="white">Mahak Khandelwal</text>
  <!-- Gradient name effect using two overlapping texts -->
  <text x="52" y="168" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="url(#btnGrad)" opacity="0.6">Mahak Khandelwal</text>
  <text x="52" y="205" font-family="Arial,sans-serif" font-size="16" font-weight="600" fill="#38bdf8">AI &amp; ML Student</text>
  <!-- Typed cursor -->
  <rect x="197" y="191" width="2" height="18" fill="#38bdf8" opacity="0.8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Description lines -->
  <rect x="52" y="222" width="260" height="7" rx="3" fill="rgba(148,163,184,0.25)"/>
  <rect x="52" y="236" width="220" height="7" rx="3" fill="rgba(148,163,184,0.18)"/>
  <rect x="52" y="250" width="240" height="7" rx="3" fill="rgba(148,163,184,0.15)"/>

  <!-- CTA Buttons -->
  <rect x="52" y="278" width="130" height="36" rx="18" fill="url(#btnGrad)" filter="url(#shadow)"/>
  <text x="87" y="301" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">⬇ Download CV</text>
  <rect x="196" y="278" width="110" height="36" rx="18" fill="transparent" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="221" y="301" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">👁 Projects</text>

  <!-- Social icons -->
  <rect x="52" y="330" width="36" height="36" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="62" y="353" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8">⌗</text>
  <rect x="98" y="330" width="36" height="36" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="108" y="353" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8">in</text>
  <rect x="144" y="330" width="36" height="36" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="152" y="353" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8">✉</text>

  <!-- RIGHT — Profile image circle -->
  <!-- Rotating border ring -->
  <circle cx="580" cy="250" r="110" fill="none" stroke="url(#btnGrad)" stroke-width="3" stroke-dasharray="50 20" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 580 250" to="360 580 250" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Outer glow -->
  <circle cx="580" cy="250" r="106" fill="rgba(124,58,237,0.08)"/>
  <!-- Image placeholder circle -->
  <circle cx="580" cy="250" r="100" fill="url(#glowPurple)" stroke="#070d1a" stroke-width="5"/>
  <!-- Silhouette shape -->
  <circle cx="580" cy="215" r="40" fill="rgba(124,58,237,0.35)"/>
  <ellipse cx="580" cy="310" rx="65" ry="45" fill="rgba(124,58,237,0.25)"/>
  <!-- Monogram -->
  <text x="562" y="258" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="rgba(255,255,255,0.15)">MK</text>

  <!-- Skill chip badges floating around -->
  <rect x="680" y="140" width="68" height="22" rx="11" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="697" y="155" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#a855f7">Python</text>
  <rect x="460" y="140" width="56" height="22" rx="11" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="474" y="155" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#38bdf8">HTML</text>
  <rect x="680" y="340" width="48" height="22" rx="11" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="696" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#22c55e">ML</text>
  <rect x="458" y="340" width="44" height="22" rx="11" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
  <text x="470" y="355" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#fbbf24">CSS</text>

  <!-- Bottom mini section preview (skills row) -->
  <rect x="0" y="420" width="800" height="80" fill="rgba(13,21,40,0.8)"/>
  <rect x="0" y="419" width="800" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="32" y="448" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="rgba(148,163,184,0.6)" letter-spacing="2">MY SKILLS</text>
  <!-- Skill mini cards -->
  <rect x="32" y="455" width="80" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="52" y="475" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">🐍 Python</text>
  <rect x="122" y="455" width="80" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="138" y="475" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">⚡ HTML</text>
  <rect x="212" y="455" width="80" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="228" y="475" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">🎨 CSS</text>
  <rect x="302" y="455" width="80" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="315" y="475" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">🤖 ML</text>
  <rect x="392" y="455" width="80" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="406" y="475" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">☁ GitHub</text>
</svg>
